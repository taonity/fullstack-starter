datasource:
  url: jdbc:h2:file:./h2_db
  username: sa
  password: sa
  driverClassName: org.h2.Driver

flyway:
  enabled: true
  cleanDisabled: false
  locations:
    - filesystem:templates/docker/flyway/sql/tables
    - filesystem:templates/docker/flyway/sql/conflicts/h2

app:
  additionalProfiles: flyway-clean-migrate
