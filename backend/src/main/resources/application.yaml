# Base configuration (Ktor). Profile overlays live in application-<profile>.yaml and are
# merged by ConfigLoader. Placeholders use ${ENV:default}.
server:
  port: 8080

session:
  cookieDomain: ${SERVER_SERVLET_SESSION_COOKIE_DOMAIN:}
  cookieName: ${SERVER_SERVLET_SESSION_COOKIE_NAME:JSESSIONID}

app:
  minimisedHttpServletLogging: true
  csrfCookieName: ${CSRF_COOKIE_NAME:XSRF-TOKEN}
  cookie:
    secure: ${COOKIE_SECURE:true}
    sameSite: ${COOKIE_SAME_SITE:Lax}

management:
  metricsApplicationTag: fullstack-starter

logging:
  structuredFormat: logstash
  levels:
    WireMock: warn
