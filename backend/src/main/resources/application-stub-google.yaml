oauth:
  registration:
    registrationId: google-fullstack-starter
    clientId: stub-google-client-id
    clientSecret: stub-google-client-secret
    redirectUri: http://127.0.0.1:8080/login/oauth2/code/google-fullstack-starter
    scope: profile,email
  provider:
    authorizationUri: http://127.0.0.1:9561/oauth2/authorize
    tokenUri: http://127.0.0.1:9561/oauth2/token
    userInfoUri: http://127.0.0.1:9561/oauth2/v3/userinfo

wiremock:
  enabled: true
  port: 9561
  classpathRoot: wiremock/google

app:
  defaultSuccessUrl: http://127.0.0.1:3000
  loginUrl: http://127.0.0.1:3000

logging:
  levels:
    WireMock: warn
