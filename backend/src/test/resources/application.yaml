server:
  port: 8080

session:
  cookieName: JSESSIONID-TEST

app:
  minimisedHttpServletLogging: false
  csrfCookieName: XSRF-TOKEN-TEST
  defaultSuccessUrl: /
  loginUrl: /
  cookie:
    secure: false
    sameSite: Lax

management:
  metricsApplicationTag: fullstack-starter

logging:
  structuredFormat: plain
  levels:
    WireMock: warn
